name: Build Android Self-Signed

on:
  # 支持手动触发构建
  workflow_dispatch:
  # 保留标签触发，如果打 tag 也会自动构建
  push:
    tags:
      - "v*"

jobs:
  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # --- 关键修改：生成自签名证书 ---
      - name: Generate Self-Signed Keystore
        run: |
          # 生成 keystore 文件
          keytool -genkey -v -keystore android/app/key.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias selfsigned -storepass 123456 -keypass 123456 \
            -dname "CN=SelfSigned, OU=App, O=Org, L=City, S=State, C=US"
            
          # 生成 key.properties 让 Gradle 读取 keystore
          cd android
          echo "storePassword=123456" > key.properties
          echo "keyPassword=123456" >> key.properties
          echo "keyAlias=selfsigned" >> key.properties
          echo "storeFile=key.jks" >> key.properties

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      # --- 上传构建产物到 Action 页面 ---
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk

      # --- (可选) 如果是打 Tag 推送，则发布到 Releases ---
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
