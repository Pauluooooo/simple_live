name: Build Android Self-Signed

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # --- 修复后的步骤：先 cd 进目录再生成 ---
      - name: Generate Self-Signed Keystore
        run: |
          # 1. 进入 android 目录创建配置
          cd android
          echo "storePassword=123456" > key.properties
          echo "keyPassword=123456" >> key.properties
          echo "keyAlias=selfsigned" >> key.properties
          # 指定 storeFile 为 key.jks，因为下面我们将把 key.jks 生成在 app 目录下
          # Gradle 在 app 模块编译时，file('key.jks') 会指向 android/app/key.jks
          echo "storeFile=key.jks" >> key.properties
          
          # 2. 确保 app 目录存在 (以防万一) 并进入
          mkdir -p app
          cd app
          
          # 3. 在当前目录 (android/app) 生成 keystore
          keytool -genkey -v -keystore key.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias selfsigned -storepass 123456 -keypass 123456 \
            -dname "CN=SelfSigned, OU=App, O=Org, L=City, S=State, C=US"
          
          # 4. 验证文件是否生成 (用于调试)
          ls -la key.jks

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
