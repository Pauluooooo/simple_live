name: Build Android Self-Signed

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # --- 修复核心：根目录生成 -> 移动到正确位置 ---
      - name: Generate and Locate Keystore
        run: |
          # 1. 为了避免路径报错，直接在根目录生成 keystore (temp.jks)
          keytool -genkey -v -keystore temp.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias selfsigned -storepass 123456 -keypass 123456 \
            -dname "CN=SelfSigned, OU=App, O=Org, L=City, S=State, C=US"
          
          # 2. 强制确保目录存在（防止偶发的环境问题）
          mkdir -p android/app
          
          # 3. 将文件移动到 android/app/ 目录下，并重命名为 key.jks
          mv temp.jks android/app/key.jks
          
          # 4. 生成 key.properties 到 android/ 目录
          # 注意：simple_live 的 build.gradle 读取的是 rootProject.file('key.properties')
          # 所以文件必须在 android/ 目录下
          echo "storePassword=123456" > android/key.properties
          echo "keyPassword=123456" >> android/key.properties
          echo "keyAlias=selfsigned" >> android/key.properties
          # 重点：因为 key.jks 已经被移到了 android/app/ 下
          # 而 build.gradle 在 android/app/ 下运行，file('key.jks') 会直接找到它
          echo "storeFile=key.jks" >> android/key.properties
          
          # 5. 打印一下文件结构以验证（调试用）
          echo "Verifying file locations:"
          ls -l android/key.properties
          ls -l android/app/key.jks

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
